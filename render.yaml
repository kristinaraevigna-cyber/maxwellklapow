# render.yaml
# Infrastructure-as-code config for Render Static Site.
# Auto-deploys on push to main. No build step — vanilla HTML/CSS/JS.

services:
  - type: web
    name: maxwellklapow
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: true

    # Security + caching headers
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

    # Clean URLs — server-level rewrite from /about to /about.html, etc.
    routes:
      - type: rewrite
        source: /about
        destination: /about.html
      - type: rewrite
        source: /research
        destination: /research.html
      - type: rewrite
        source: /publications
        destination: /publications.html
      - type: rewrite
        source: /consulting
        destination: /consulting.html
      - type: rewrite
        source: /contact
        destination: /contact.html
